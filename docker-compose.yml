services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_IS_BATTLE_API: '${NUXT_PUBLIC_IS_BATTLE_API:-}'
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - NUXT_PUBLIC_IS_BATTLE_API=${NUXT_PUBLIC_IS_BATTLE_API:-}
      - NUXT_API_BASE_URL=${NUXT_API_BASE_URL:-https://ilya.burdyugov.fvds.ru}
    restart: unless-stopped
